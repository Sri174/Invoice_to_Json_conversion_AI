services:
  # ----------------------------------------
  # 1. FastAPI Backend Service
  # ----------------------------------------
  - type: web
    name: invoice-api
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: GEMINI_API_KEY
        sync: false # You MUST add this secret in the Render dashboard
      - key: OCR_COMPANY_ID
        value: "27"
      - key: OCR_SETTINGS_ID
        value: "0"
      - key: OCR_SETTINGS_API_URL
        value: "http://200.1.50.10:7003/settings/getsettingsocr" # Team internal API, ensure Render can access this, otherwise use alternative API

  # ----------------------------------------
  # 2. Streamlit UI Service
  # ----------------------------------------
  - type: web
    name: invoice-ui
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "streamlit run ui.py --server.port $PORT --server.address 0.0.0.0"
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      # Link the UI to the dynamically generated URL of the backend API
      - key: API_URL
        fromService:
          type: web
          name: invoice-api
          envVarKey: RENDER_EXTERNAL_URL
